<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>予約管理</title>
  <style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0ece4;
  --left-bg: #fff8f0;
  --right-bg: #f7f3ec;
  --accent: #c0392b;
  --accent2: #e67e22;
  --text: #2c2c2c;
  --text-light: #7a7a7a;
  --border: #ddd5c8;
  --today-bg: #fde8d8;
  --selected-bg: #c0392b;
  --selected-text: #fff;
  --shadow: 0 2px 8px rgba(0,0,0,0.12);
  --modal-bg: #fffdf9;
  --font-main: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  --radius: 12px;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: var(--font-main);
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

#app {
  display: grid;
  grid-template-columns: 36% 64%;
  height: 100vh;
  gap: 0;
}

#left-col {
  background: var(--left-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 16px 14px 12px;
  gap: 14px;
}

#calendar-wrap {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  flex-shrink: 0;
}

#cal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--accent);
  color: #fff;
  padding: 10px 14px;
}

#cal-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; }

.nav-btn {
  background: none; border: none; color: #fff; font-size: 1.6rem; cursor: pointer;
  width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
  border-radius: 8px; transition: background 0.15s;
}
.nav-btn:active { background: rgba(255,255,255,0.2); }

#cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: #fbe9e7; border-bottom: 1px solid var(--border);
}
#cal-weekdays span {
  text-align: center; font-size: 0.72rem; font-weight: 700; padding: 6px 0; color: var(--text-light);
}
#cal-weekdays span:first-child { color: var(--accent); }
#cal-weekdays span:last-child { color: #2980b9; }

#cal-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }

.cal-day {
  min-height: 52px; display: flex; flex-direction: column; align-items: center;
  justify-content: center; cursor: pointer; border: 1px solid transparent;
  transition: background 0.1s; position: relative; padding: 4px 2px; gap: 2px;
}
.cal-day:active { background: #f0e0d8; }

.cal-day-num {
  font-size: 1rem; font-weight: 500; line-height: 1;
  width: 34px; height: 34px; display: flex; align-items: center;
  justify-content: center; border-radius: 50%;
}
.cal-day.today .cal-day-num { background: var(--today-bg); border: 2px solid var(--accent2); font-weight: 700; }
.cal-day.selected .cal-day-num { background: var(--selected-bg); color: var(--selected-text); font-weight: 700; }
.cal-day.sun .cal-day-num { color: var(--accent); }
.cal-day.sat .cal-day-num { color: #2980b9; }
.cal-day.other-month .cal-day-num { color: #ccc; }
.cal-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
.cal-day.other-month .cal-dot { background: #ccc; }

#memo-wrap {
  background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
  display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0;
}
#memo-label {
  padding: 10px 14px 6px; font-size: 0.82rem; font-weight: 700;
  color: var(--text-light); border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#memo-area {
  flex: 1; border: none; outline: none; padding: 12px 14px;
  font-family: var(--font-main); font-size: 0.95rem; color: var(--text);
  resize: none; background: transparent; line-height: 1.6;
}

#right-col { background: var(--right-bg); display: flex; flex-direction: column; overflow: hidden; }

#right-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; background: var(--right-bg);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#selected-date-label { font-size: 1.3rem; font-weight: 700; color: var(--text); }

#header-btns { display: flex; gap: 10px; align-items: center; }

#add-btn {
  background: var(--accent); color: #fff; border: none; border-radius: 10px;
  padding: 12px 20px; font-size: 1rem; font-weight: 700; cursor: pointer;
  min-height: 48px; transition: background 0.15s, transform 0.1s; letter-spacing: 0.03em;
}
#add-btn:active { background: #a93226; transform: scale(0.97); }

#cards-area {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: grid; grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: min-content; gap: 14px; align-content: start;
  -webkit-overflow-scrolling: touch;
}

.res-card {
  background: #fffbe6; border-radius: 14px; padding: 16px 18px;
  box-shadow: 3px 3px 0px rgba(0,0,0,0.08), var(--shadow);
  cursor: pointer; transition: transform 0.12s, box-shadow 0.12s;
  border-top: 5px solid var(--accent2); min-height: 140px;
  display: flex; flex-direction: column; gap: 6px; position: relative;
}
.res-card:active { transform: scale(0.97); box-shadow: 1px 1px 0px rgba(0,0,0,0.08); }
.res-card:nth-child(5n+1) { background: #fffbe6; border-top-color: #e67e22; }
.res-card:nth-child(5n+2) { background: #e8f8e8; border-top-color: #27ae60; }
.res-card:nth-child(5n+3) { background: #e8f0ff; border-top-color: #2980b9; }
.res-card:nth-child(5n+4) { background: #fff0f5; border-top-color: #c0392b; }
.res-card:nth-child(5n+5) { background: #f5f0ff; border-top-color: #8e44ad; }

.card-time { font-size: 1.6rem; font-weight: 800; color: var(--text); line-height: 1; }
.card-name { font-size: 1.15rem; font-weight: 700; color: var(--text); }
.card-phone { font-size: 0.9rem; color: var(--text-light); }
.card-memo { font-size: 0.85rem; color: #555; margin-top: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-edit-hint { position: absolute; top: 10px; right: 12px; font-size: 0.7rem; color: rgba(0,0,0,0.25); }

#no-reservations {
  grid-column: 1 / -1; text-align: center;
  color: var(--text-light); font-size: 1rem; padding: 40px 20px;
}

/* Modal */
#modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; backdrop-filter: blur(3px);
}
#modal-overlay.hidden { display: none; }
#modal {
  background: var(--modal-bg); border-radius: 18px; padding: 28px 32px;
  width: 520px; max-width: 90vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
}
#modal h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: var(--text); }
#reservation-form { display: flex; flex-direction: column; gap: 14px; }
#reservation-form label { display: flex; flex-direction: column; gap: 5px; font-size: 0.82rem; font-weight: 700; color: var(--text-light); }
#reservation-form input, #reservation-form select {
  border: 1.5px solid var(--border); border-radius: 9px; padding: 12px 14px;
  font-family: var(--font-main); font-size: 1rem; color: var(--text);
  background: #fff; outline: none; min-height: 48px; transition: border-color 0.15s;
}
#reservation-form input:focus, #reservation-form select:focus { border-color: var(--accent); }

#modal-btns { display: flex; gap: 10px; margin-top: 6px; justify-content: flex-end; flex-wrap: wrap; }
#modal-btns button {
  border: none; border-radius: 10px; padding: 13px 22px; font-size: 0.95rem;
  font-weight: 700; cursor: pointer; min-height: 48px; transition: background 0.15s, transform 0.1s;
}
#modal-btns button:active { transform: scale(0.97); }
#modal-cancel { background: #eee; color: var(--text); }
#modal-cancel:active { background: #ddd; }
#modal-save { background: var(--accent); color: #fff; }
#modal-save:active { background: #a93226; }
#modal-delete { background: #fff0f0; color: var(--accent); border: 1.5px solid var(--accent); }
#modal-delete:active { background: #fdd; }
#modal-print { background: #1a6e3c; color: #fff; }
#modal-print:active { background: #145530; }

.hidden { display: none !important; }

#cards-area::-webkit-scrollbar { width: 6px; }
#cards-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#memo-area::-webkit-scrollbar { width: 4px; }
#memo-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ===== レシート印刷用（画面では非表示） ===== */
#receipt-area { display: none; }

@media print {
  #app, #modal-overlay { display: none !important; }

  #receipt-area {
    display: block !important;
    width: 72mm;
    margin: 0;
    padding: 4mm 3mm;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    font-size: 11pt;
    color: #000;
    background: #fff;
  }

  @page {
    size: 80mm auto;
    margin: 0;
  }

  .rp-shop {
    text-align: center; font-size: 14pt; font-weight: 900;
    border-bottom: 2px solid #000; padding-bottom: 3mm;
    margin-bottom: 2mm; letter-spacing: 0.08em;
  }
  .rp-label {
    text-align: center; font-size: 9pt; color: #555;
    margin-bottom: 4mm; letter-spacing: 0.05em;
  }
  .rp-time {
    text-align: center; font-size: 34pt; font-weight: 900;
    letter-spacing: 0.05em; margin: 3mm 0 1mm; line-height: 1;
  }
  .rp-name {
    text-align: center; font-size: 17pt; font-weight: 900; margin-bottom: 1mm;
  }
  .rp-persons {
    text-align: center; font-size: 13pt; font-weight: 700; margin-bottom: 3mm;
  }
  .rp-hr { border: none; border-top: 1px dashed #000; margin: 3mm 0; }
  .rp-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 2mm; gap: 4mm;
  }
  .rp-key { font-size: 9pt; color: #444; white-space: nowrap; flex-shrink: 0; }
  .rp-val { font-size: 11pt; font-weight: 700; text-align: right; word-break: break-all; }
  .rp-memo {
    border: 1px solid #000; border-radius: 1.5mm; padding: 2mm 3mm;
    font-size: 10pt; margin-top: 2mm; white-space: pre-wrap; word-break: break-all;
  }
  .rp-footer {
    text-align: center; font-size: 8.5pt; margin-top: 5mm;
    padding-top: 3mm; border-top: 1px solid #000;
  }
  .rp-issued { text-align: center; font-size: 7.5pt; color: #777; margin-top: 2mm; }
}
  </style>
</head>
<body>

<div id="app">
  <div id="left-col">
    <div id="calendar-wrap">
      <div id="cal-header">
        <button id="prev-month" class="nav-btn">‹</button>
        <span id="cal-title"></span>
        <button id="next-month" class="nav-btn">›</button>
      </div>
      <div id="cal-weekdays">
        <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
      </div>
      <div id="cal-days"></div>
    </div>
    <div id="memo-wrap">
      <div id="memo-label">📝 メモ</div>
      <textarea id="memo-area" placeholder="この日のメモを入力..."></textarea>
    </div>
  </div>

  <div id="right-col">
    <div id="right-header">
      <h2 id="selected-date-label">日付を選択してください</h2>
      <div id="header-btns">
        <button id="add-btn">＋ 予約追加</button>
      </div>
    </div>
    <div id="cards-area"></div>
  </div>
</div>

<div id="modal-overlay" class="hidden">
  <div id="modal">
    <h3 id="modal-title">予約を追加</h3>
    <form id="reservation-form">
      <input type="hidden" id="edit-id">
      <label>日付
        <input type="date" id="f-date" required>
      </label>
      <label>開始時刻
        <select id="f-time" required></select>
      </label>
      <label>お名前
        <input type="text" id="f-name" list="name-list" placeholder="例：山田太郎" required autocomplete="off">
        <datalist id="name-list"></datalist>
      </label>
      <label>電話番号（任意）
        <input type="tel" id="f-phone" placeholder="例：090-1234-5678">
      </label>
      <label>人数
        <select id="f-persons">
          <option value="1">1名</option><option value="2">2名</option>
          <option value="3">3名</option><option value="4">4名</option>
          <option value="5">5名</option><option value="6">6名</option>
          <option value="7">7名</option><option value="8">8名</option>
        </select>
      </label>
      <label>メモ（任意）
        <input type="text" id="f-memo" placeholder="アレルギーなど">
      </label>
      <div id="modal-btns">
        <button type="button" id="modal-cancel">キャンセル</button>
        <button type="button" id="modal-delete" class="hidden">削除</button>
        <button type="button" id="modal-print" class="hidden">🖨 印刷</button>
        <button type="button" id="modal-save">保存</button>
      </div>
    </form>
  </div>
</div>

<!-- 印刷時のみ表示されるレシートエリア -->
<div id="receipt-area"></div>

<script>
const STORAGE_KEY = 'yoyaku_v1';
const SHOP_NAME = 'ご予約確認';  // ← 店名をここに変更できます

let state = { reservations: [], memos: {}, customers: {} };
let selectedDate = todayStr();
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
const notified = {};

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function pad(n) { return String(n).padStart(2,'0'); }
function formatDate(str) {
  if (!str) return '';
  const [y,m,d] = str.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}
function formatPhone(phone) {
  if (!phone) return '';
  const digits = phone.replace(/\D/g,'');
  if (digits.length===11) return digits.replace(/(\d{3})(\d{4})(\d{4})/,'$1-$2-$3');
  if (digits.length===10) return digits.replace(/(\d{3})(\d{3})(\d{4})/,'$1-$2-$3');
  return phone;
}
function addSama(name) {
  if (!name) return '';
  if (name.endsWith('様')||name.endsWith('さま')) return name;
  return name + ' 様';
}
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}
function nowStr() {
  const d = new Date();
  return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const p = JSON.parse(raw);
      state.reservations = p.reservations || [];
      state.memos = p.memos || {};
      state.customers = p.customers || {};
    }
  } catch(e) { console.error(e); }
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.error(e); }
}

/* カレンダー */
function renderCalendar() {
  const year=currentYear, month=currentMonth;
  document.getElementById('cal-title').textContent=`${year}年${month+1}月`;
  const firstDay=new Date(year,month,1).getDay();
  const lastDate=new Date(year,month+1,0).getDate();
  const prevLastDate=new Date(year,month,0).getDate();
  const today=todayStr();
  const datesWithRes=new Set(state.reservations.map(r=>r.date));
  const container=document.getElementById('cal-days');
  container.innerHTML='';

  for(let i=firstDay-1;i>=0;i--){
    const d=prevLastDate-i;
    container.appendChild(makeDayCell(d,`${year}-${pad(month)}-${pad(d)}`,'other-month'));
  }
  for(let d=1;d<=lastDate;d++){
    const ds=`${year}-${pad(month+1)}-${pad(d)}`;
    const dow=new Date(year,month,d).getDay();
    const cls=dow===0?'sun':dow===6?'sat':'';
    const cell=makeDayCell(d,ds,cls);
    if(ds===today)cell.classList.add('today');
    if(ds===selectedDate)cell.classList.add('selected');
    if(datesWithRes.has(ds)){const dot=document.createElement('div');dot.className='cal-dot';cell.appendChild(dot);}
    container.appendChild(cell);
  }
  const rem=(firstDay+lastDate)%7===0?0:7-((firstDay+lastDate)%7);
  for(let d=1;d<=rem;d++){
    container.appendChild(makeDayCell(d,`${year}-${pad(month+2)}-${pad(d)}`,'other-month'));
  }
}

function makeDayCell(d,dateStr,extraClass){
  const cell=document.createElement('div');
  cell.className='cal-day'+(extraClass?' '+extraClass:'');
  cell.dataset.date=dateStr;
  const num=document.createElement('div');num.className='cal-day-num';num.textContent=d;
  cell.appendChild(num);
  cell.addEventListener('click',()=>selectDate(dateStr));
  return cell;
}

function selectDate(dateStr){
  selectedDate=dateStr;
  renderCalendar();renderCards();renderMemo();
  document.getElementById('selected-date-label').textContent=formatDate(dateStr);
}

/* カード */
function renderCards(){
  const area=document.getElementById('cards-area');
  area.innerHTML='';
  const dayRes=state.reservations.filter(r=>r.date===selectedDate).sort((a,b)=>a.time.localeCompare(b.time));
  if(dayRes.length===0){
    const msg=document.createElement('div');msg.id='no-reservations';msg.textContent='この日の予約はありません';
    area.appendChild(msg);return;
  }
  dayRes.forEach(r=>{
    const card=document.createElement('div');card.className='res-card';
    const hint=document.createElement('div');hint.className='card-edit-hint';hint.textContent='タップで編集';card.appendChild(hint);
    const time=document.createElement('div');time.className='card-time';time.textContent=r.time;card.appendChild(time);
    const name=document.createElement('div');name.className='card-name';name.textContent=`${r.persons}名 ${addSama(r.name)}`;card.appendChild(name);
    if(r.phone){const ph=document.createElement('div');ph.className='card-phone';ph.textContent=formatPhone(r.phone);card.appendChild(ph);}
    if(r.memo){const me=document.createElement('div');me.className='card-memo';me.textContent=r.memo;card.appendChild(me);}
    card.addEventListener('click',()=>openModal(r.id));
    area.appendChild(card);
  });
}

/* メモ */
let memoTimer=null;
function renderMemo(){ document.getElementById('memo-area').value=state.memos[selectedDate]||''; }
document.getElementById('memo-area').addEventListener('input',()=>{
  clearTimeout(memoTimer);
  memoTimer=setTimeout(()=>{state.memos[selectedDate]=document.getElementById('memo-area').value;save();},1000);
});

/* モーダル */
function buildTimeOptions(){
  const sel=document.getElementById('f-time');sel.innerHTML='';
  for(let h=0;h<24;h++) for(let m=0;m<60;m+=30){
    const val=`${pad(h)}:${pad(m)}`;
    const opt=document.createElement('option');opt.value=val;opt.textContent=val;sel.appendChild(opt);
  }
}
function buildNameList(){
  const dl=document.getElementById('name-list');dl.innerHTML='';
  Object.keys(state.customers).sort().forEach(name=>{
    const opt=document.createElement('option');opt.value=name;dl.appendChild(opt);
  });
}

function openModal(editId){
  buildTimeOptions();buildNameList();
  document.getElementById('reservation-form').reset();
  const deleteBtn=document.getElementById('modal-delete');
  const printBtn=document.getElementById('modal-print');
  if(editId){
    const r=state.reservations.find(x=>x.id===editId);if(!r)return;
    document.getElementById('modal-title').textContent='予約を編集';
    document.getElementById('edit-id').value=editId;
    document.getElementById('f-date').value=r.date;
    document.getElementById('f-time').value=r.time;
    document.getElementById('f-name').value=r.name;
    document.getElementById('f-phone').value=r.phone||'';
    document.getElementById('f-persons').value=r.persons;
    document.getElementById('f-memo').value=r.memo||'';
    deleteBtn.classList.remove('hidden');
    printBtn.classList.remove('hidden');
  } else {
    document.getElementById('modal-title').textContent='予約を追加';
    document.getElementById('edit-id').value='';
    document.getElementById('f-date').value=selectedDate;
    const now=new Date();
    let h=now.getHours(),m=now.getMinutes()<30?30:0;
    if(m===0)h=Math.min(h+1,23);
    document.getElementById('f-time').value=`${pad(h)}:${pad(m)}`;
    deleteBtn.classList.add('hidden');
    printBtn.classList.add('hidden');
  }
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('f-name').focus();
}
function closeModal(){ document.getElementById('modal-overlay').classList.add('hidden'); }

document.getElementById('add-btn').addEventListener('click',()=>openModal(null));
document.getElementById('modal-cancel').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',(e)=>{
  if(e.target===document.getElementById('modal-overlay'))closeModal();
});
document.getElementById('modal-delete').addEventListener('click',()=>{
  const id=document.getElementById('edit-id').value;if(!id)return;
  if(confirm('この予約を削除しますか？')){
    state.reservations=state.reservations.filter(r=>r.id!==id);
    save();closeModal();renderCalendar();renderCards();
  }
});

/* 印刷ボタン（編集モーダルから） */
document.getElementById('modal-print').addEventListener('click',()=>{
  const id=document.getElementById('edit-id').value;if(!id)return;
  const r=state.reservations.find(x=>x.id===id);if(!r)return;
  closeModal();
  setTimeout(()=>printReceipt(r), 100);
});

/* 保存 */
document.getElementById('modal-save').addEventListener('click',()=>{
  const id=document.getElementById('edit-id').value;
  const date=document.getElementById('f-date').value;
  const time=document.getElementById('f-time').value;
  const name=document.getElementById('f-name').value.trim();
  const phone=document.getElementById('f-phone').value.trim();
  const persons=parseInt(document.getElementById('f-persons').value);
  const memo=document.getElementById('f-memo').value.trim();
  if(!date||!time||!name){ alert('日付・時刻・お名前は必須です'); return; }

  let savedRes;
  const isNew=!id;
  if(id){
    savedRes=state.reservations.find(x=>x.id===id);
    if(savedRes){savedRes.date=date;savedRes.time=time;savedRes.name=name;savedRes.phone=phone;savedRes.persons=persons;savedRes.memo=memo;}
  } else {
    savedRes={id:generateId(),date,time,name,phone,persons,memo};
    state.reservations.push(savedRes);
  }
  if(name)state.customers[name]=true;
  save();
  closeModal();
  if(date!==selectedDate){
    selectedDate=date;
    document.getElementById('selected-date-label').textContent=formatDate(date);
    renderMemo();
  }
  renderCalendar();renderCards();

  // 新規登録時は自動印刷（try-catchで保護）
  if(savedRes && isNew){
    setTimeout(()=>{ try { printReceipt(savedRes); } catch(e){ console.warn('印刷スキップ:', e); } }, 150);
  }
});

/* ===== レシート印刷 ===== */
function printReceipt(r){
  const area=document.getElementById('receipt-area');
  area.innerHTML=`
    <div class="rp-shop">${SHOP_NAME}</div>
    <div class="rp-label">ご予約確認票</div>
    <div class="rp-time">${r.time}</div>
    <div class="rp-name">${addSama(r.name)}</div>
    <div class="rp-persons">${r.persons}名様</div>
    <hr class="rp-hr">
    <div class="rp-row">
      <span class="rp-key">日付</span>
      <span class="rp-val">${formatDate(r.date)}</span>
    </div>
    ${r.phone?`<div class="rp-row"><span class="rp-key">電話</span><span class="rp-val">${formatPhone(r.phone)}</span></div>`:''}
    ${r.memo?`<hr class="rp-hr"><div class="rp-memo">📝 ${r.memo}</div>`:''}
    <hr class="rp-hr">
    <div class="rp-footer">ご来店をお待ちしております</div>
    <div class="rp-issued">発行：${nowStr()}</div>
  `;
  try { window.print(); } catch(e) { console.warn('印刷スキップ（プレビュー環境）:', e); }
}

/* 通知 */
function todayReservationAlert(){
  const today=todayStr();
  const todayRes=state.reservations.filter(r=>r.date===today).sort((a,b)=>a.time.localeCompare(b.time));
  if(todayRes.length===0)return;
  const lines=todayRes.map(r=>`  ${r.time} - ${r.persons}名 ${r.name}様${r.memo?' ('+r.memo+')':''}`).join('\n');
  alert(`【本日の予約】\n\n${lines}`);
}
function checkUpcomingNotifications(){
  const now=new Date(),today=todayStr();
  state.reservations.filter(r=>r.date===today).forEach(r=>{
    const [rh,rm]=r.time.split(':').map(Number);
    const resTime=new Date();resTime.setHours(rh,rm,0,0);
    const diff=(resTime-now)/60000;
    const key30=`${r.id}_30`;
    if(diff>28&&diff<=31&&!notified[key30]){notified[key30]=true;alert(`【予約30分前】\n${r.time} - ${r.persons}名 ${r.name}様`);}
    const key5=`${r.id}_5`;
    if(diff>3&&diff<=6&&!notified[key5]){notified[key5]=true;alert(`【予約5分前】\n${r.time} - ${r.persons}名 ${r.name}様`);}
  });
}

/* 初期化 */
function init(){
  load();buildTimeOptions();
  const today=new Date();
  currentYear=today.getFullYear();currentMonth=today.getMonth();
  selectedDate=todayStr();
  document.getElementById('selected-date-label').textContent=formatDate(selectedDate);
  renderCalendar();renderCards();renderMemo();
  document.getElementById('prev-month').addEventListener('click',()=>{
    currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}renderCalendar();
  });
  document.getElementById('next-month').addEventListener('click',()=>{
    currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}renderCalendar();
  });
  setTimeout(todayReservationAlert,800);
  setInterval(checkUpcomingNotifications,60000);
  checkUpcomingNotifications();
}

document.addEventListener('DOMContentLoaded',init);
</script>
